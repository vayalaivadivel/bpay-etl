name: Hop-Deploy
on:
  push:
    branches: [main]
    paths:
      - "hop-orchestration/**"

  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read

concurrency:
  group: hop-deploy-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  hop-deploy:
    name: Apache Hop ECS Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      AWS_REGION: ap-south-1
      APP_NAME: bpay-etl
      ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
      ECR_REPOSITORY: glorytechsystems-platform-images
      IMAGE_TAG: bpay-etl-hop-${{ github.event.inputs.environment || 'dev' }}
      ECS_CLUSTER_NAME: bpay-etl-ecs-${{ github.event.inputs.environment || 'dev' }}
      ECS_SERVICE_NAME: bpay-etl-hop-service-${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::986401823783:role/bpay-etl-githubaction-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS Login
        shell: bash
        run: |
          set -euo pipefail
          aws sts get-caller-identity
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV
          echo "IMAGE_URI=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify ECR Repository
        run: |
          set -euo pipefail
          aws ecr describe-repositories --repository-names ${ECR_REPOSITORY} --region ${AWS_REGION}

      - name: Verify ECS Cluster
        run: |
          set -euo pipefail
          aws ecs describe-clusters --clusters ${ECS_CLUSTER_NAME} --region ${AWS_REGION}

      - name: Verify ECS Service
        run: |
          set -euo pipefail   
          aws ecs describe-services --cluster ${ECS_CLUSTER_NAME} --services ${ECS_SERVICE_NAME} --region ${AWS_REGION}

      - name: Build Docker Image
        run: |
          set -euo pipefail
          docker build --pull --no-cache \
            -t ${APP_NAME}:${IMAGE_TAG} \
            -f hop-orchestration/docker/Dockerfile \
            ./hop-orchestration

      - name: Verify Local Docker Image
        run: |
          set -euo pipefail
          docker images
          docker image inspect ${APP_NAME}:${IMAGE_TAG}

      - name: Tag Docker Image
        run: |
          set -euo pipefail
          docker tag ${APP_NAME}:${IMAGE_TAG} ${IMAGE_URI}

      - name: Push Docker Image
        run: |
          set -euo pipefail
          docker push ${IMAGE_URI}

      - name: Verify Image
        run: |
          set -euo pipefail
          aws ecr describe-images \
            --repository-name ${ECR_REPOSITORY} \
            --image-ids imageTag=${IMAGE_TAG} \
            --region ${AWS_REGION}

      - name: Restart ECS Service
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster ${ECS_CLUSTER_NAME} \
            --service ${ECS_SERVICE_NAME} \
            --force-new-deployment \
            --region ${AWS_REGION}
          sleep 15

      - name: Wait for ECS Service
        run: |
          set -euo pipefail
          aws ecs wait services-stable \
            --cluster ${ECS_CLUSTER_NAME} \
            --services ${ECS_SERVICE_NAME} \
            --region ${AWS_REGION}
      
      - name: List ECS Tasks
        run: |
          set -euo pipefail

          aws ecs list-tasks \
            --cluster ${ECS_CLUSTER_NAME} \
            --region ${AWS_REGION}

      - name: Show ECS Events
        if: always()
        run: |
          set -euo pipefail
          aws ecs describe-services \
            --cluster ${ECS_CLUSTER_NAME} \
            --services ${ECS_SERVICE_NAME} \
            --query 'services[0].events[0:10]' \
            --region ${AWS_REGION}

      - name: Docker Cleanup
        if: always()
        run: |
          set -euo pipefail
          docker image prune -af

      - name: Deployment Summary
        if: success()
        run: |
          echo "======================================="
          echo "Apache Hop Deployment Successful"
          echo "======================================="
          echo "Environment : ${ENVIRONMENT}"
          echo "Cluster     : ${ECS_CLUSTER_NAME}"
          echo "Service     : ${ECS_SERVICE_NAME}"
          echo "Repository  : ${ECR_REPOSITORY}"
          echo "Image       : ${IMAGE_URI}"
          echo "======================================="
