name: Infra-Setup

on:
  workflow_dispatch:
    inputs:

      environment:
        description: "Select environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

      action:
        description: "Choose action"
        required: true
        type: choice
        options:
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:

  terraform:

    runs-on: ubuntu-latest

    timeout-minutes: 90

    environment:
      ${{ github.event.inputs.environment }}

    defaults:
      run:
        working-directory: infra

    env:
      TF_IN_AUTOMATION: true
      TF_VAR_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      
    steps:

    #########################################
    # CHECKOUT
    #########################################

    - name: Checkout
      uses: actions/checkout@v4

    #########################################
    # CONFIGURE AWS
    #########################################

    - name: Configure AWS (OIDC)
      uses: aws-actions/configure-aws-credentials@v4

      with:
        role-to-assume: arn:aws:iam::986401823783:role/bpay-etl-githubaction-role

        aws-region: ap-south-1

    #########################################
    # INSTALL MYSQL CLIENT
    #########################################

    - name: Install MySQL Client
      run: |

        sudo apt-get update

        sudo apt-get install -y mysql-client || \
        sudo apt-get install -y default-mysql-client

        mysql --version

    #########################################
    # CREATE PEM FILE
    #########################################

    - name: Create EC2 PEM file
      run: |

        echo "${{ secrets.EC2_PRIVATE_KEY }}" > bastion-key.pem

        chmod 400 bastion-key.pem

    #########################################
    # SETUP TERRAFORM
    #########################################

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

      with:
        terraform_wrapper: false

    #########################################
    # VERIFY OIDC LOGIN
    #########################################

    - name: Verify AWS Login

      run: |

        echo "===================================="

        echo "GitHub Repository"

        echo "${{ github.repository }}"

        echo

        echo "GitHub Branch"

        echo "${{ github.ref_name }}"

        echo

        echo "AWS Identity"

        aws sts get-caller-identity

        echo "===================================="

    #########################################
    # TERRAFORM INIT
    #########################################

    - name: Terraform Init
      run: |

        terraform init -upgrade \
          -backend-config="key=bpay-etl/${{ github.event.inputs.environment }}/terraform.tfstate"

    #########################################
    # TERRAFORM VALIDATE
    #########################################

    - name: Terraform Validate
      run: terraform validate

    #########################################
    # TERRAFORM FORMAT CHECK
    #########################################

    - name: Terraform Format Check
      run: terraform fmt -check

    #########################################
    # TERRAFORM PLAN
    #########################################

    - name: Terraform Plan
      shell: bash

      run: |

        set +e

        terraform plan \
          -parallelism=20 \
          -var-file=environments/${{ github.event.inputs.environment }}.tfvars \
          -out=tfplan

        EXIT_CODE=$?

        echo "Terraform exit code: $EXIT_CODE"

        if [ "$EXIT_CODE" -eq 1 ]; then

          echo "❌ Terraform plan failed"

          exit 1
        fi

        echo "✅ Terraform plan successful"

    #########################################
    # TERRAFORM APPLY
    #########################################

    - name: Terraform Apply
      if: github.event.inputs.action == 'apply'

      run: |

        terraform apply \
          -parallelism=20 \
          -auto-approve \
          tfplan

    #########################################
    # DISPLAY OUTPUTS
    #########################################

    - name: Display Terraform Outputs
      if: github.event.inputs.action == 'apply'

      run: |

        echo "======================================"
        echo "Terraform Outputs"
        echo "======================================"

        terraform output

    #########################################
    # BLOCK PROD DESTROY
    #########################################

    - name: Block Prod Destroy
      if: github.event.inputs.action == 'destroy' &&
          github.event.inputs.environment == 'prod'

      run: |

        echo "❌ Destroy not allowed for PROD"

        exit 1

    #########################################
    # DELETE HOP ECR IMAGE
    #########################################

    - name: Delete Hop ECR Image
      if: github.event.inputs.action == 'destroy'

      run: |

        echo "======================================"
        echo "Deleting Hop Docker Image"
        echo "======================================"

        aws ecr batch-delete-image \
          --repository-name glorytechsystems-platform-images \
          --image-ids imageTag=bpay-etl-${{ github.event.inputs.environment }} \
          --region ap-south-1 || true

        echo "======================================"
        echo "Hop Docker Image Deleted"
        echo "======================================"

    #########################################
    # TERRAFORM DESTROY
    #########################################

    - name: Terraform Destroy
      if: github.event.inputs.action == 'destroy'
      shell: bash

      run: |

        set +e

        terraform destroy \
          -parallelism=20 \
          -auto-approve \
          -var-file=environments/${{ github.event.inputs.environment }}.tfvars

        EXIT_CODE=$?

        if [ "$EXIT_CODE" -ne 0 ]; then

          echo "Terraform destroy finished with expected Route53 Hosted Zone protection."

          echo "Checking for remaining infrastructure..."

          terraform state list

          exit 0

        fi

        echo "Terraform destroy completed successfully."